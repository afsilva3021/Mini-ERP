<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Cadastro - InApp Painel de Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../sources/css/style.css">
   <link rel="apple-touch-icon" sizes="180x180" href="../sources/images/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../sources/images/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../sources/images/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="../sources/images/favicon_io/site.webmanifest">

</head>

<body>


<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card " style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
     <a href="dashboard.html" class="mb-4 d-inline-block"><img src="../sources/images/logo-icon.svg" alt="" width="36">
      <span class="ms-2"> <img src="../sources/images/logo.svg" alt=""></span>
      </a>
        <h1 class="card-title mb-5 h5">Crie sua conta</h1>

      </div>

      <form id="signupForm" class="needs-validation mt-3" novalidate>
        <div class="mb-3">
          <label for="fullName" class="form-label">Nome completo</label>
          <input id="fullName" name="fullName" type="text" class="form-control" placeholder="Jane Doe" required>
          <div class="invalid-feedback">Por favor, insira seu nome.</div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Endereço de email</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="name@example.com" required>
          <div class="invalid-feedback">Por favor, insira um email válido.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input id="password" name="password" type="password" class="form-control" placeholder="Crie uma senha" required minlength="6">
          <div class="invalid-feedback">Por favor, forneça uma senha (mín. 6 caracteres).</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar senha</label>
          <input id="confirmPassword" type="password" class="form-control" placeholder="Repita a senha" required
            oninput="this.setCustomValidity(document.getElementById('password').value !== this.value ? 'Senhas não conferem.' : '')">
          <div class="invalid-feedback">As senhas devem coincidir.</div>
        </div>

        <div class="mb-3 form-check">
          <input id="terms" class="form-check-input" type="checkbox" required>
          <label class="form-check-label small" for="terms">Eu concordo com os <a href="#" class="text-decoration-none">termos e privacidade</a></label>
          <div class="invalid-feedback">Você deve concordar antes de continuar.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Cadastrar</button>
        <div id="signupMessage" class="alert mt-3 d-none" role="alert"></div>
      </form>

      <div class="text-center mt-3 small text-muted">
        Já tem uma conta? <a href="auth/login.html" class="link-primary">Entrar</a>
      </div>
    </div>
  </div>
</div>



  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../sources/js/config.js"></script>
  <script src="../sources/js/api.js"></script>
  <script src="../sources/js/app.js"></script>
  <script src="../sources/js/signup.js"></script>


</body>

</html>
