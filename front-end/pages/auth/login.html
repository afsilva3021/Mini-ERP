<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - InApp Painel de Controle</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.28.1/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../sources/css/style.css">
  
</head>
<body>
  <div class="auth-page">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card auth-card">
            <div class="card-body p-5">
                <div class="text-center mb-3">
                    <a href="../dashboard.html" class="mb-4 d-inline-flex align-items-center text-decoration-none">
                        <img src="../../sources/images/logo-icon.svg" alt="" width="36">
                        <span class="ms-2"><img src="../../sources/images/logo.svg" alt=""></span>
                    </a>
                    <h1 class="card-title mb-5 h5">Entre na sua conta</h1>
                </div>

                

                <form id="loginForm" class="needs-validation mt-3" novalidate>
                    

                    <div class="mb-3">
                        <label for="email" class="form-label">Endereço de email</label>
                        <input id="email" name="email" type="email" class="form-control" placeholder="name@example.com" required autofocus>
                        <div class="invalid-feedback">Por favor, insira um email válido.</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label d-flex justify-content-between">
                            <span>Senha</span>
                            <a href="#" class="small link-primary">Esqueceu a senha?</a>
                        </label>
                        <input id="password" name="password" type="password" class="form-control" placeholder="Senha" required minlength="6">
                        <div class="invalid-feedback">Por favor, forneça uma senha (mín. 6 caracteres).</div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input id="remember" name="remember" class="form-check-input" type="checkbox">
                            <label class="form-check-label small" for="remember">Lembrar de mim</label>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                    <div id="loginMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
                </form>

                <div class="text-center mt-3 small text-muted">
                    Não tem uma conta? <a href="../signup.html" class="link-primary">Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../sources/js/config.js"></script>
  <script src="../../sources/js/api.js"></script>
  <script src="../../sources/js/app.js"></script>
  <script src="../../sources/js/login.js"></script>
</body>
</html>
